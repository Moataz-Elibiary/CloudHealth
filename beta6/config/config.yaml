# ============================================================================
# CloudHealth Beta 6 — config.yaml
# Runs headless from a central Linux server that SSHes to all bastions.
# All keys are optional — defaults are shown in comments.
# ============================================================================

# ── Parallelism ───────────────────────────────────────────────────────────────
parallel_limit:     5      # max clusters processed simultaneously
max_parallel_nodes: 10     # max nodes checked in parallel per cluster
ssh_timeout:        30     # seconds for SSH connection
cmd_timeout:        60     # seconds per remote command

# ── Paths (~ is expanded at runtime) ──────────────────────────────────────────
output_dir:    ~/cloud_health/reports
log_dir:       ~/cloud_health/logs
db_path:       ~/cloud_health/db/history.db
inventory_file: ~/cloud_health/config/inventory.yaml

# ── Logging & reports ─────────────────────────────────────────────────────────
max_log_files:    5        # newest N log files to keep per prefix (system_, commands_, host-)
max_report_files: 10       # newest N report files to keep per type (full + email)

# ── History ───────────────────────────────────────────────────────────────────
history_max_runs: 200      # number of past runs to retain in the central DB

# ── Thresholds (global defaults; overridable per-cluster in inventory.yaml) ───
thresholds:
  disk_percent:  85    # disk_threshold
  mem_warn:      80    # mem_used_pct_warn
  mem_fail:      95    # mem_used_pct_fail
  load_warn:     2.0   # load_ratio_warn
  load_fail:     5.0   # load_ratio_fail
  swap_warn:     30    # swap_used_pct_warn

# ── OCP-specific thresholds ───────────────────────────────────────────────────
cert_warn_days:          30   # warn if a TLS certificate expires within this many days
restart_warn_threshold:   5   # pod restart count that triggers a WARN
restart_fail_threshold:  20   # pod restart count that triggers a FAIL
pod_age_min_warn:         5   # warn if a pod is younger than this many minutes
pod_age_min_fail:         2   # fail if a pod is younger than this many minutes

