<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudHealth Beta 3 - Sample (Running)</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }

        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .cluster-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .cluster-info h2 { margin: 0; font-size: 1.4rem; color: #fff; }
        .cluster-info p { margin: 0.2rem 0 0; font-size: 0.9rem; color: var(--text-dim); }

        .status-pill { padding: 0.2rem 0.8rem; border-radius: 2rem; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-running { background: var(--primary); animation: glow 1.5s infinite alternate; }

        @keyframes glow { from { box-shadow: 0 0 5px var(--primary); } to { box-shadow: 0 0 15px var(--primary); } }

        .headline-zone {
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 0.5rem;
            border-left: 3px solid var(--primary);
            font-family: monospace;
            font-size: 0.9rem;
            color: #cbd5e1;
            min-height: 1.2rem;
        }

        .btn-main { background: var(--primary); color: white; border: none; padding: 0.8rem 2rem; border-radius: 0.5rem; font-weight: bold; opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CloudHealth Beta 3</h1>
            <p style="color: var(--text-dim); margin-top: 0.5rem;">Distributed Diagnostics & Real-time Orchestration</p>
        </header>

        <div style="text-align: center; margin-bottom: 2.5rem;">
            <button class="btn-main">Diagnostic Running...</button>
        </div>

        <div id="cards">
            <!-- Sample Cluster: Running -->
            <div class="cluster-card">
                <div class="card-header">
                    <div class="cluster-info">
                        <h2>OCP-Production-01</h2>
                        <p>Core Infrastructure Health</p>
                    </div>
                    <span class="status-pill status-running">RUNNING</span>
                </div>
                <div class="headline-zone">> Investigating OCP Node Health... checking kubelet status on master-1</div>
            </div>
        </div>
    </div>
</body>
</html>
